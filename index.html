<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sửa Chữa Đồ Gỗ Tận Nơi HCM</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f8f8f8;
    }

    /* HEADER */
    header {
      background: #5a3e2b;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 15px;
    }

    header img {
      width: 45px;
      height: 45px;
      border-radius: 8px;
    }

    header h1 {
      font-size: 16px;
      margin: 0;
    }

    /* BANNER */

.banner {
  width: 100%;
  aspect-ratio: 16 / 6;
  overflow: hidden;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

    .container {
      padding: 20px;
    }

    .desc {
      text-align: center;
      margin-bottom: 20px;
    }

    /* BUTTONS */
    .btn {
      display: block;
      margin: 10px auto;
      padding: 15px;
      width: 90%;
      max-width: 320px;
      text-align: center;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
    }

    .call { background: #28a745; }
    .zalo { background: #0068ff; }
    .fb { background: #1877f2; }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="public/logo.png" alt="logo">
  <h1>Sửa Chữa Đồ Gỗ Tận Nơi HCM</h1>
</header>

<!-- BANNER -->
<div class="banner">
  <img src="public/banner.webp" alt="banner">
</div>

<div class="container">

  <div class="desc">
    <h2>Dịch vụ sửa đồ gỗ tận nơi</h2>
    <p>Uy tín - Nhanh chóng - Giá hợp lý tại TP.HCM</p>
  </div>

  <!-- CALL -->
  <a class="btn call" href="tel:0971282878">
    📞 Gọi ngay: 0971 282 878
  </a>

  <!-- ZALO -->
  <a class="btn zalo" href="#" onclick="goToZalo(event)">
    💬 Chat Zalo
  </a>

  <!-- FACEBOOK -->
  <a class="btn fb" href="https://facebook.com/suachuadogohcm.vn" target="_blank">
    👍 Facebook
  </a>

  <h3 style="text-align:center; margin-top:30px;">Hình ảnh dịch vụ</h3>

  <div class="gallery">
    <img src="public/img1.jpg" loading="lazy">
    <img src="public/img2.jpg" loading="lazy">
    <img src="public/img3.jpg" loading="lazy">
    <img src="public/img4.jpg" loading="lazy">
    <img src="public/img5.jpg" loading="lazy">
    <img src="public/img6.jpg" loading="lazy">
  </div>

</div>

<footer>
  © 2026 - suachuadogohcm.vn
</footer>

<!-- ZALO SCRIPT -->
<script>
function goToZalo(event) {
    event.preventDefault();

    var phone = "0971282878";
    var qrCodeId = "9wgvd001cwde";

    var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    var isAndroid = /Android/i.test(navigator.userAgent);

    if (isIOS) {
        window.location.href = "https://zalo.me/" + phone;
    } 
    else if (isAndroid) {
        window.location.href = "zalo://zaloapp.com/qr/p/" + qrCodeId;
    } 
    else {
        window.open("https://zalo.me/" + phone, "_blank");
    }
}
</script>

</body>
</html>
