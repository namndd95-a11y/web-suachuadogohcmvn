<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sửa Chữa Đồ Gỗ Tận Nơi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f8f8f8;
    }

    /* HEADER */
    header {
      background: #5a3e2b;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header img {
      width: 45px;
      height: 45px;
      border-radius: 8px;
    }

    header h1 {
      font-size: 18px;
      margin: 0;
    }

    /* BANNER */
    .banner img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
    }

    .container {
      padding: 20px;
    }

    .cta a {
      display: block;
      margin: 10px auto;
      padding: 15px;
      width: 90%;
      max-width: 300px;
      text-align: center;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .call { background: green; }
    .zalo { background: #0068ff; }
    .fb { background: #1877f2; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
    }

  </style>
</head>

<body>

<!-- HEADER + LOGO -->
<header>
  <img src="public/logo.png" alt="Logo">
  <h1>Sửa Chữa Đồ Gỗ Tận Nơi HCM</h1>
</header>

<!-- BANNER -->
<div class="banner">
  <img src="public/banner.jpg" alt="Banner">
</div>

<div class="container">

  <h2>Dịch vụ của chúng tôi</h2>
  <p>Sửa chữa đồ gỗ tận nơi - nhanh chóng - uy tín tại TP.HCM</p>

  <!-- CTA -->
  <div class="cta">
    <a class="call" href="tel:0933227017">📞 Gọi ngay</a>
    <a class="zalo" href="zalo://conversation?phone=0933227017">💬 Zalo</a>
    <a class="fb" href="https://facebook.com/suachuadogohcm.vn">👍 Facebook</a>
  </div>

  <h2>Hình ảnh dịch vụ</h2>

  <div class="gallery">
    <img src="public/img1.jpg">
    <img src="public/img2.jpg">
    <img src="public/img3.jpg">
    <img src="public/img4.jpg">
  </div>

</div>

</body>
</html>
